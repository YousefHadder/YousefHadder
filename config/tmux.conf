# =============================================================================
# TMUX CONFIGURATION (CI-safe subset for profile GIF recording)
# Based on ~/.tmux.conf - uses catppuccin plugin directly, no TPM needed
# =============================================================================

# -----------------------------------------------------------------------------
# Terminal Configuration
# -----------------------------------------------------------------------------
set -g default-terminal "tmux-256color"
set-option -ag terminal-overrides ',xterm-256color*:RGB'
set -ga terminal-overrides ",*256col*:Tc"
set -sg escape-time 10
set -g xterm-keys on

# -----------------------------------------------------------------------------
# Catppuccin Theme
# -----------------------------------------------------------------------------
set-option -g @catppuccin_flavor 'mocha'
set-option -g @catppuccin_window_status_style 'rounded'
set-option -g @catppuccin_window_number_position 'right'
set-option -g @catppuccin_window_flags 'none'
set-option -g @catppuccin_window_text '#W'
set-option -g @catppuccin_window_current_text '#W'
set-option -g @catppuccin_window_current_text_color '#{E:@thm_surface_2}'
set-option -g @catppuccin_date_time_text '%d.%m. %H:%M'
set-option -g @catppuccin_status_module_text_bg '#{E:@thm_mantle}'
set-option -g @catppuccin_status_middle_separator '▐'

# Load catppuccin plugin (must come before status-left/right)
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins"
run "$HOME/.tmux/plugins/tmux/catppuccin.tmux"

# -----------------------------------------------------------------------------
# Status Bar Configuration
# -----------------------------------------------------------------------------
set-option -g status-justify absolute-centre
set-option -g status-position top
set-option -g status-interval 5
set-option -g status-left-length 100
set-option -g status-right-length 100

set-option -g status-left '#{E:@catppuccin_status_session}'
set-option -g  status-right '#[bg=#{E:@thm_green},fg=#{E:@thm_crust}]  #[bg=#{E:@thm_surface_0},fg=#{E:@thm_fg}] #(bash $HOME/scripts/cpu.sh) '
set-option -ag status-right '#[bg=#{E:@thm_blue},fg=#{E:@thm_crust}]  #[bg=#{E:@thm_surface_0},fg=#{E:@thm_fg}] #(bash $HOME/scripts/ram.sh) '

# -----------------------------------------------------------------------------
# Key Bindings
# -----------------------------------------------------------------------------

# Prefix Key
set -g prefix C-b

# Window Creation
bind-key c new-window -c '#{pane_current_path}'

# Window Splitting
bind-key -T prefix '|' split-window -h -c '#{pane_current_path}'
bind-key -T prefix '-' split-window -v -c '#{pane_current_path}'

# Window Navigation (repeatable)
bind-key -r h previous-window
bind-key -r l next-window

# Window Reordering
bind-key -r H swap-window -t -1\; select-window -t -1
bind-key -r L swap-window -t +1\; select-window -t +1

# Pane Resizing (Large increments)
bind-key -r -T prefix M-k resize-pane -U 5
bind-key -r -T prefix M-j resize-pane -D 5
bind-key -r -T prefix M-h resize-pane -L 5
bind-key -r -T prefix M-l resize-pane -R 5

# Pane Resizing (Small increments)
bind-key -r -T prefix C-k resize-pane -U
bind-key -r -T prefix C-j resize-pane -D
bind-key -r -T prefix C-h resize-pane -L
bind-key -r -T prefix C-l resize-pane -R

# -----------------------------------------------------------------------------
# Window and Pane Options
# -----------------------------------------------------------------------------
set-option -g base-index 1
set-option -g pane-base-index 1
set-option -g renumber-windows on
set-option -g allow-rename off
set-option -g focus-events on
set-option -g detach-on-destroy off

# -----------------------------------------------------------------------------
# System Integration
# -----------------------------------------------------------------------------
set -g mouse on
set -g allow-passthrough all
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
set -g set-clipboard on
