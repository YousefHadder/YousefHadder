# =============================================================================
# TMUX CONFIGURATION (CI-safe subset for profile GIF recording)
# Based on ~/.tmux.conf - keeps visual styling, strips plugins/custom modules
# =============================================================================

# -----------------------------------------------------------------------------
# Key Bindings
# -----------------------------------------------------------------------------

# Prefix Key
set -g prefix C-b

# Window Creation
bind-key c new-window -c '#{pane_current_path}'

# Window Splitting
bind-key -T prefix '|' split-window -h -c '#{pane_current_path}'
bind-key -T prefix '-' split-window -v -c '#{pane_current_path}'

# Window Navigation (repeatable)
bind-key -r h previous-window
bind-key -r l next-window

# Pane Resizing (Large increments)
bind-key -r -T prefix M-k resize-pane -U 5
bind-key -r -T prefix M-j resize-pane -D 5
bind-key -r -T prefix M-h resize-pane -L 5
bind-key -r -T prefix M-l resize-pane -R 5

# Pane Resizing (Small increments)
bind-key -r -T prefix C-k resize-pane -U
bind-key -r -T prefix C-j resize-pane -D
bind-key -r -T prefix C-h resize-pane -L
bind-key -r -T prefix C-l resize-pane -R

# -----------------------------------------------------------------------------
# Window and Pane Options
# -----------------------------------------------------------------------------
set-option -g base-index 1
set-option -g pane-base-index 1
set-option -g renumber-windows on
set-option -g allow-rename off
set-option -g focus-events on
set-option -g detach-on-destroy off

# -----------------------------------------------------------------------------
# Terminal Configuration
# -----------------------------------------------------------------------------
set -g default-terminal "tmux-256color"
set-option -ag terminal-overrides ',xterm-256color*:RGB'
set -ga terminal-overrides ",*256col*:Tc"
set -sg escape-time 10
set -g xterm-keys on

# -----------------------------------------------------------------------------
# System Integration
# -----------------------------------------------------------------------------
set -g mouse on
set -g allow-passthrough all
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
set -g set-clipboard on

# -----------------------------------------------------------------------------
# Status Bar Configuration
# -----------------------------------------------------------------------------
set-option -g status-justify absolute-centre
set-option -g status-position top
set-option -g status-interval 15
set-option -g status-left-length 100
set-option -g status-right-length 100

# Catppuccin Mocha-inspired status bar colors (no plugin needed)
set-option -g status-style 'bg=#1e1e2e fg=#cdd6f4'
set-option -g window-status-current-style 'bg=#45475a fg=#cdd6f4 bold'
set-option -g window-status-style 'bg=#1e1e2e fg=#6c7086'
set-option -g pane-border-style 'fg=#45475a'
set-option -g pane-active-border-style 'fg=#89b4fa'
set-option -g message-style 'bg=#45475a fg=#cdd6f4'

set-option -g status-left ' #[fg=#89b4fa]#S '
set-option -g status-right ' #[fg=#a6adc8]%H:%M '
