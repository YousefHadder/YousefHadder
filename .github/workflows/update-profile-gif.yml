name: Update Profile GIF

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly on Sunday at midnight UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  generate-gif:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y neovim ffmpeg

      - name: Install ttyd
        run: |
          curl -fsSL -o /tmp/ttyd https://github.com/tsl0922/ttyd/releases/latest/download/ttyd.x86_64
          chmod +x /tmp/ttyd
          sudo mv /tmp/ttyd /usr/local/bin/ttyd
          ttyd --version

      - name: Install VHS
        run: |
          VHS_VERSION=$(curl -fsSL https://api.github.com/repos/charmbracelet/vhs/releases/latest | jq -r .tag_name | sed 's/^v//')
          curl -fsSL "https://github.com/charmbracelet/vhs/releases/download/v${VHS_VERSION}/vhs_${VHS_VERSION}_Linux_x86_64.tar.gz" \
            | tar -xz -C /tmp
          sudo mv "/tmp/vhs_${VHS_VERSION}_Linux_x86_64/vhs" /usr/local/bin/vhs
          vhs --version

      - name: Install JetBrainsMono Nerd Font
        run: |
          mkdir -p ~/.local/share/fonts
          curl -fsSL -o /tmp/JetBrainsMono.tar.xz \
            https://github.com/ryanoasis/nerd-fonts/releases/latest/download/JetBrainsMono.tar.xz
          tar -xf /tmp/JetBrainsMono.tar.xz -C ~/.local/share/fonts
          fc-cache -fv

      - name: Configure tmux
        run: |
          git clone --depth 1 --branch v2.1.3 https://github.com/catppuccin/tmux.git \
            "$HOME/.tmux/plugins/tmux"
          mkdir -p "$HOME/scripts"
          cp scripts/cpu.sh scripts/ram.sh "$HOME/scripts/"
          chmod +x "$HOME/scripts/cpu.sh" "$HOME/scripts/ram.sh"
          cp config/tmux.conf ~/.tmux.conf

      - name: Set up Neovim config
        run: |
          # Copy the CI nvim config (alpha dashboard + bebop theme + lualine)
          mkdir -p ~/.config/nvim
          cp -r config/nvim/* ~/.config/nvim/
          # Pre-install lazy.nvim and plugins headlessly (no output in GIF)
          nvim --headless "+Lazy! sync" +qa 2>/dev/null || true
          # Run a second time to ensure everything is settled
          nvim --headless "+Lazy! sync" +qa 2>/dev/null || true

      - name: Install and configure Starship prompt
        run: |
          curl -fsSL https://starship.rs/install.sh | sh -s -- --yes
          mkdir -p ~/.config
          cp config/starship.toml ~/.config/starship.toml
          # Ensure starship loads in every bash shell VHS spawns (incl. tmux panes)
          echo 'eval "$(starship init bash)"' >> ~/.bashrc
          echo 'eval "$(starship init bash)"' >> ~/.bash_profile

      - name: Install termgraph
        run: pip install termgraph

      - name: Generate stats data
        run: |
          chmod +x scripts/generate-stats.sh
          bash scripts/generate-stats.sh YousefHadder
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Generate profile GIF
        run: vhs profile.tape

      - name: Upload GIF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: profile-gif
          path: profile.gif
          retention-days: 30

      - name: Commit and push updated GIF
        run: |
          mkdir -p img
          cp profile.gif img/profile.gif
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add img/profile.gif
          git diff --cached --quiet && echo "No changes to commit" || \
            (git commit -m "chore: update profile GIF [skip ci]" && git push)
